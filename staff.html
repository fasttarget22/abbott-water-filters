<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abbott Water Filters — Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0d2233;--navy2:#112840;
  --teal:#1a9bbf;--teal2:#22b8e0;--teal3:#127a96;
  --white:#eef3f8;--dim:#7a8fa3;
}
body{font-family:'Outfit','Segoe UI',system-ui,sans-serif;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}

/* Subtle background radial */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(26,155,191,.07) 0%,transparent 70%);pointer-events:none}

.card{position:relative;z-index:1;background:rgba(17,40,64,.7);border:1px solid rgba(26,155,191,.18);border-radius:22px;padding:40px 36px 32px;max-width:400px;width:100%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.04);backdrop-filter:blur(12px)}

.logo-wrap{background:var(--white);border-radius:14px;padding:10px 16px;display:inline-flex;margin-bottom:22px;box-shadow:0 6px 24px rgba(26,155,191,.16)}

.tag{font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);font-weight:700;margin-bottom:10px}
.title{font-size:22px;font-weight:800;color:var(--white);margin-bottom:8px}
.subtitle{font-size:13.5px;color:var(--dim);line-height:1.6;margin-bottom:28px}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(26,155,191,.2),transparent);margin:0 -36px 28px}

.btn-login{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;background:linear-gradient(135deg,var(--teal3) 0%,var(--teal) 60%,var(--teal2) 100%);color:#fff;text-decoration:none;border-radius:12px;font-size:15px;font-weight:800;letter-spacing:.02em;box-shadow:0 4px 18px rgba(26,155,191,.4);transition:all .18s;font-family:inherit}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 7px 24px rgba(26,155,191,.55);filter:brightness(1.06)}
.btn-login:active{transform:translateY(0)}

.notice{margin-top:16px;font-size:11.5px;color:rgba(122,143,163,.5);line-height:1.6}

.back-link{margin-top:24px;display:block;font-size:12px;color:rgba(122,143,163,.4);text-decoration:none;transition:color .18s}
.back-link:hover{color:rgba(122,143,163,.75)}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">

        <linearGradient id="s-bg" x1="0" y1="0" x2="0.3" y2="1"><stop offset="0%" stop-color="#f0f8fc"/><stop offset="100%" stop-color="#d0e6f0"/></linearGradient>
